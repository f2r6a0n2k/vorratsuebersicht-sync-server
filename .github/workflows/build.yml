name: Build & Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  server:
    strategy:
      matrix:
        rid: [win-x64, linux-x64, linux-arm, osx-x64, osx-arm64]
        include:
          - rid: win-x64
            os: ubuntu-latest
            ext: .exe
            artifact: vorratsuebersicht-sync-server-windows-x64.zip
            folder: windows
          - rid: linux-x64
            os: ubuntu-latest
            ext: ""
            artifact: vorratsuebersicht-sync-server-linux-x64.tar.gz
            folder: linux
          - rid: linux-arm
            os: ubuntu-latest
            ext: ""
            artifact: vorratsuebersicht-sync-server-linux-arm.tar.gz
            folder: linux-arm
          - rid: osx-x64
            os: macos-latest
            ext: ""
            artifact: vorratsuebersicht-sync-server-macos-x64.tar.gz
            folder: macos
          - rid: osx-arm64
            os: macos-latest
            ext: ""
            artifact: vorratsuebersicht-sync-server-macos-arm64.tar.gz
            folder: macos

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish server (${{ matrix.rid }})
        run: |
          dotnet publish src/Vorratsuebersicht.SyncServer \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o publish/server/${{ matrix.folder }}

      - name: Package server (${{ matrix.rid }})
        run: |
          cd publish/server/${{ matrix.folder }}
          if [ "${{ matrix.rid }}" = "win-x64" ]; then
            zip -r ../${{ matrix.artifact }} .
          else
            tar czf ../${{ matrix.artifact }} .
          fi

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: publish/server/${{ matrix.artifact }}

  desktop:
    strategy:
      matrix:
        rid: [win-x64, linux-x64, osx-x64, osx-arm64]
        include:
          - rid: win-x64
            os: ubuntu-latest
            ext: .exe
            artifact: vorratsuebersicht-desktop-windows-x64.zip
            folder: windows
          - rid: linux-x64
            os: ubuntu-latest
            ext: ""
            artifact: vorratsuebersicht-desktop-linux-x64.tar.gz
            folder: linux
          - rid: osx-x64
            os: macos-latest
            ext: ""
            artifact: vorratsuebersicht-desktop-macos-x64.tar.gz
            folder: macos
          - rid: osx-arm64
            os: macos-latest
            ext: ""
            artifact: vorratsuebersicht-desktop-macos-arm64.tar.gz
            folder: macos

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish desktop (${{ matrix.rid }})
        run: |
          dotnet publish src/Clients/Vorratsuebersicht.Desktop \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o publish/desktop/${{ matrix.folder }}

      - name: Package desktop (${{ matrix.rid }})
        run: |
          cd publish/desktop/${{ matrix.folder }}
          if [ "${{ matrix.rid }}" = "win-x64" ]; then
            zip -r ../${{ matrix.artifact }} .
          else
            tar czf ../${{ matrix.artifact }} .
          fi

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: publish/desktop/${{ matrix.artifact }}

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package web UI
        run: |
          mkdir -p publish/web
          cp -r src/Vorratsuebersicht.SyncServer/wwwroot/* publish/web/
          cd publish
          zip -r web-ui.zip web/
      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: vorratsuebersicht-web-ui.zip
          path: publish/web-ui.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [server, desktop, web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Determine pre-release
        id: channel
        run: |
          TAG="${{ github.ref_name }}"
          if echo "$TAG" | grep -qE "(beta|alpha|rc|preview)"; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "channel=Beta" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "channel=Stable" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release structure
        run: |
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            case "$name" in
              vorratsuebersicht-sync-server-*) mkdir -p release/server && cp "$dir"/* release/server/ ;;
              vorratsuebersicht-desktop-*)      mkdir -p release/desktop && cp "$dir"/* release/desktop/ ;;
              vorratsuebersicht-web-ui*)        mkdir -p release/web-ui && cp "$dir"/* release/web-ui/ ;;
            esac
          done
          echo "=== Release structure ==="
          find release -type f -exec ls -lh {} \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/*
          prerelease: ${{ steps.channel.outputs.prerelease }}
          generate_release_notes: true
          body: |
            # Vorratsübersicht – ${{ steps.channel.outputs.channel }} v${{ github.ref_name }}

            ## Server (SyncServer – Zentrale Datenbank im LAN)
            | Plattform | Datei | Größe |
            |-----------|-------|-------|
            | 🪟 Windows | `server/vorratsuebersicht-sync-server-windows-x64.zip` | — |
            | 🐧 Linux | `server/vorratsuebersicht-sync-server-linux-x64.tar.gz` | — |
            | 🥧 Linux ARM (RPi) | `server/vorratsuebersicht-sync-server-linux-arm.tar.gz` | — |
            | 🍎 macOS Intel | `server/vorratsuebersicht-sync-server-macos-x64.tar.gz` | — |
            | 🍎 macOS Apple Silicon | `server/vorratsuebersicht-sync-server-macos-arm64.tar.gz` | — |

            ## Desktop-Client (GUI für Win/Linux/macOS)
            | Plattform | Datei | Größe |
            |-----------|-------|-------|
            | 🪟 Windows | `desktop/vorratsuebersicht-desktop-windows-x64.zip` | — |
            | 🐧 Linux | `desktop/vorratsuebersicht-desktop-linux-x64.tar.gz` | — |
            | 🍎 macOS Intel | `desktop/vorratsuebersicht-desktop-macos-x64.tar.gz` | — |
            | 🍎 macOS Apple Silicon | `desktop/vorratsuebersicht-desktop-macos-arm64.tar.gz` | — |

            ## Web-UI (Browser)
            - `web-ui/vorratsuebersicht-web-ui.zip` — index.html + CSS + JS

            ## Hinweise
            - **Kein .NET SDK nötig** – alle Binaries sind self-contained
            - Einfach entpacken und `Vorratsuebersicht.SyncServer` starten
            - Desktop-Client: Server-URL in den Einstellungen eintragen
            - Web-UI: Im Browser `http://localhost:5191/` öffnen
